<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>豪华休闲游戏乐园 | 三款小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a40);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-box {
            text-align: center;
            padding-top: 60px;
            padding-bottom: 50px;
            animation: fadeDown 1s ease;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-box h1 {
            font-size: 52px;
            color: #fff;
            background: linear-gradient(90deg, #00f5d4, #6dd5ed, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 245, 212, 0.4);
            letter-spacing: 4px;
            margin-bottom: 15px;
        }

        .header-box p {
            color: #c0c8e7;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .nav-btn {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .nav-btn button {
            padding: 16px 30px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            color: #fff;
            background: linear-gradient(135deg, #4158d0, #c850c0);
            box-shadow: 0 10px 30px rgba(65, 88, 208, 0.4);
        }

        .nav-btn button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .nav-btn button:hover::before {
            left: 100%;
        }

        .nav-btn button:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 15px 40px rgba(200, 80, 192, 0.5);
        }

        .nav-btn button.active {
            background: linear-gradient(135deg, #ffffff, #e0e0ff);
            color: #24243e;
        }

        .game-card {
            width: 580px;
            margin: 0 auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .game-view {
            display: none;
            text-align: center;
            animation: scaleIn 0.6s ease;
        }

        .game-view.show {
            display: block;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .game-title {
            font-size: 26px;
            color: #ffffff;
            margin-bottom: 25px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.18);
            letter-spacing: 2px;
        }

        canvas {
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.2);
            background: #fff;
        }

        .desc {
            width: 600px;
            margin: 40px auto;
            text-align: center;
            color: #a9b4e8;
            font-size: 16px;
            line-height: 2;
        }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>🎮 豪华游戏娱乐中心</h1>
        <p>华容道 | 打字训练 | 贪吃蛇 · 休闲解压</p>
    </div>

    <div class="nav-btn">
        <button class="active" onclick="switchGame(1)">🧩 数字华容道</button>
        <button onclick="switchGame(2)">⌨️ 打字挑战</button>
        <button onclick="switchGame(3)">🐍 贪吃蛇</button>
    </div>

    <div class="game-card">
        <!-- 华容道 -->
        <div id="g1" class="game-view show">
            <div class="game-title">智慧数字华容道（5×5）</div>
            <canvas id="c1" width="500" height="500"></canvas>
        </div>

        <!-- 打字游戏 -->
        <div id="g2" class="game-view">
            <div class="game-title">字母打字闯关游戏</div>
            <canvas id="c2" width="420" height="420"></canvas>
        </div>

        <!-- 贪吃蛇 -->
        <div id="g3" class="game-view">
            <div class="game-title">经典贪吃蛇游戏（方向键控制）</div>
            <canvas id="c3" width="420" height="420"></canvas>
        </div>
    </div>

    <div class="desc">
        <p>🧩 华容道：点击空白旁边方块移动复原</p>
        <p>⌨️ 打字：按下对应字母消除得分</p>
        <p>🐍 贪吃蛇：键盘方向键控制，吃到食物变长</p>
    </div>

<script>
// 切换游戏
function switchGame(num){
    document.querySelectorAll(".game-view").forEach(item=>{
        item.classList.remove("show");
    });
    document.getElementById("g"+num).classList.add("show");

    document.querySelectorAll(".nav-btn button").forEach((btn,i)=>{
        btn.classList.toggle("active", i+1 === num);
    });
}

// ============ 1.华容道 ============
const cv1 = document.getElementById("c1");
const ctx1 = cv1.getContext("2d");
const cell = 100;
let map = [];
let emptyX = 4;
let emptyY = 4;
let step = 0;

function initGame(){
    let n = 1;
    for(let y=0;y<5;y++){
        map[y] = [];
        for(let x=0;x<5;x++){
            map[y][x] = n++;
        }
    }
    map[4][4] = 0;

    let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for(let i=0;i<1200;i++){
        let r = dirs[Math.floor(Math.random()*4)];
        let nx = emptyX + r[0];
        let ny = emptyY + r[1];
        if(nx>=0&&nx<5&&ny>=0&&ny<5){
            map[emptyY][emptyX] = map[ny][nx];
            map[ny][nx] = 0;
            emptyX = nx;
            emptyY = ny;
        }
    }
    step = 0;
    drawMap();
}

function drawMap(){
    ctx1.clearRect(0,0,500,500);
    for(let y=0;y<5;y++){
        for(let x=0;x<5;x++){
            let val = map[y][x];
            let gra = ctx1.createLinearGradient(x*cell,y*cell,x*cell+cell,y*cell+cell);
            gra.addColorStop(0,"#f0f4ff");
            gra.addColorStop(1,"#e8ecfb");
            ctx1.fillStyle = gra;
            ctx1.fillRect(x*cell+3,y*cell+3,cell-6,cell-6);

            if(val !== 0){
                ctx1.fillStyle = "#252b60";
                ctx1.font = "42px Microsoft Yahei";
                ctx1.textAlign = "center";
                ctx1.fillText(val, x*cell+50, y*cell+62);
            }
        }
    }
    ctx1.fillStyle = "#222";
    ctx1.font = "22px 微软雅黑";
    ctx1.textAlign = "left";
    ctx1.fillText("步数："+step,15,28);
}

cv1.addEventListener("click", function(e){
    let x = Math.floor(e.offsetX / cell);
    let y = Math.floor(e.offsetY / cell);
    let d = [[1,0],[-1,0],[0,1],[0,-1]];
    for(let i of d){
        if(x+i[0]===emptyX && y+i[1]===emptyY){
            map[emptyY][emptyX] = map[y][x];
            map[y][x] = 0;
            emptyX = x;
            emptyY = y;
            step++;
            drawMap();
            return;
        }
    }
});
initGame();

// ============ 2.打字游戏 ============
const cv2 = document.getElementById("c2");
const ctx2 = cv2.getContext("2d");
let charList = [];
let score = 0;
let allChar = "abcdefghijklmnopqrstuvwxyz";

function addChar(){
    let px = Math.random() * 350 + 30;
    charList.push({
        x: px,
        y: 5,
        text: allChar[Math.floor(Math.random() * allChar.length)]
    });
}

function drawChar(){
    ctx2.clearRect(0,0,420,420);
    ctx2.fillStyle = "#2c3e80";
    ctx2.font = "24px 微软雅黑";
    ctx2.fillText("分数：" + score, 12, 32);

    let speed = 0.4 + score/120;
    for(let i=0;i<charList.length;i++){
        let s = charList[i];
        ctx2.fillStyle = "#1f2456";
        ctx2.font = "28px Consolas";
        ctx2.fillText(s.text, s.x, s.y);
        s.y += speed;
    }
    charList = charList.filter(t => t.y < 415);
}

function runGame(){
    if(Math.random() < 0.015) addChar();
    drawChar();
    requestAnimationFrame(runGame);
}

document.addEventListener("keydown", function(e){
    let key = e.key;
    let idx = charList.findIndex(t=>t.text === key);
    if(idx !== -1){
        score++;
        charList.splice(idx,1);
    }
});
runGame();

// ============ 3.贪吃蛇游戏 ============
const cv3 = document.getElementById("c3");
const ctx3 = cv3.getContext("2d");
const box = 20;
let snake = [];
snake[0] = {x:10*box, y:10*box};

let food = {
    x: Math.floor(Math.random()*20)*box,
    y: Math.floor(Math.random()*20)*box
};

let dir = "right";
let nextDir = "right";
let snakeScore = 0;

document.addEventListener("keydown",e=>{
    let k = e.keyCode;
    if(k===37&&dir!="right") nextDir="left";
    if(k===38&&dir!="down") nextDir="up";
    if(k===39&&dir!="left") nextDir="right";
    if(k===40&&dir!="up") nextDir="down";
});

function drawSnake(){
    dir = nextDir;
    ctx3.fillStyle="#fff";
    ctx3.fillRect(0,0,420,420);

    //食物
    ctx3.fillStyle="red";
    ctx3.fillRect(food.x,food.y,box,box);

    //蛇身
    ctx3.fillStyle="#27ae60";
    for(let i=0;i<snake.length;i++){
        ctx3.fillRect(snake[i].x,snake[i].y,box-1,box-1);
    }

    //头部
    let headX = snake[0].x;
    let headY = snake[0].y;

    if(dir=="left") headX-=box;
    if(dir=="right") headX+=box;
    if(dir=="up") headY-=box;
    if(dir=="down") headY+=box;

    //撞墙
    if(headX<0||headX>=420||headY<0||headY>=420){
        clearInterval(speedGo);
        alert("游戏结束！得分："+snakeScore);
        location.reload();
    }

    //吃到食物
    if(headX==food.x && headY==food.y){
        snakeScore++;
        food.x = Math.floor(Math.random()*20)*box;
        food.y = Math.floor(Math.random()*20)*box;
    }else{
        snake.pop();
    }

    //撞自身
    for(let i=0;i<snake.length;i++){
        if(snake[i].x==headX&&snake[i].y==headY){
            clearInterval(speedGo);
            alert("撞到自己！得分："+snakeScore);
            location.reload();
        }
    }

    let newHead = {x:headX,y:headY};
    snake.unshift(newHead);
}

let speedGo = setInterval(drawSnake,110);
</script>

</body>
</html>
