<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0,user-scalable=no"/>
    <title>豪华休闲游戏乐园 | 三款小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a40);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-box {
            text-align: center;
            padding-top: 40px;
            padding-bottom: 40px;
            animation: fadeDown 1s ease;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-box h1 {
            font-size: 42px;
            color: #fff;
            background: linear-gradient(90deg, #00f5d4, #6dd5ed, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }

        .header-box p {
            color: #c0c8e7;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .nav-btn {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            flex-wrap: wrap;
            padding: 0 10px;
        }

        .nav-btn button {
            padding: 12px 22px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            background: linear-gradient(135deg, #4158d0, #c850c0);
        }

        .nav-btn button.active {
            background: #fff;
            color: #24243e;
        }

        .game-card {
            width: 440px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 20px;
        }

        .game-view {
            display: none;
            text-align: center;
        }

        .game-view.show {
            display: block;
        }

        .game-title {
            font-size: 22px;
            color: #fff;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.18);
        }

        canvas {
            border-radius: 12px;
            background: #fff;
            max-width: 100%;
        }

        .desc {
            text-align: center;
            color: #a9b4e8;
            font-size: 14px;
            padding: 30px 15px;
            line-height: 1.8;
        }

        /* 贪吃蛇虚拟方向按键（修复版）*/
        .ctrl-box{
            margin-top:20px;
            display:none;
            position: relative;
            z-index: 10; /* 最上层 */
        }
        .ctrl-box.show{
            display:block;
        }
        .ctrl-btn{
            width:70px;
            height:70px;
            font-size:28px;
            margin:6px;
            border:none;
            border-radius:12px;
            background:#ffffff;
            color:#222;
            font-weight:bold;
            touch-action: manipulation; /* 防止浏览器拦截 */
        }
        .ctrl-btn:active{
            background:#ddd;
            color:#f00;
        }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>🎮 豪华游戏娱乐中心</h1>
        <p>华容道 | 打字训练 | 贪吃蛇</p>
    </div>

    <div class="nav-btn">
        <button class="active" onclick="switchGame(1)">🧩 华容道</button>
        <button onclick="switchGame(2)">⌨️ 打字挑战</button>
        <button onclick="switchGame(3)">🐍 贪吃蛇</button>
    </div>

    <div class="game-card">
        <div id="g1" class="game-view show">
            <div class="game-title">5×5数字华容道</div>
            <canvas id="c1" width="450" height="450"></canvas>
        </div>

        <div id="g2" class="game-view">
            <div class="game-title">字母打字闯关</div>
            <canvas id="c2" width="420" height="420"></canvas>
        </div>

        <div id="g3" class="game-view">
            <div class="game-title">贪吃蛇游戏</div>
            <canvas id="c3" width="420" height="420"></canvas>

            <!-- 手机虚拟控制按钮（修复点击） -->
            <div class="ctrl-box" id="ctrlBox">
                <div>
                    <button class="ctrl-btn" id="btnUp">↑</button>
                </div>
                <div>
                    <button class="ctrl-btn" id="btnLeft">←</button>
                    <button class="ctrl-btn" id="btnDown">↓</button>
                    <button class="ctrl-btn" id="btnRight">→</button>
                </div>
            </div>
        </div>
    </div>

    <div class="desc">
        <p>🧩 华容道：点击空格旁方块移动复原</p>
        <p>⌨️ 打字：键盘按对应字母得分</p>
        <p>🐍 贪吃蛇：电脑方向键 / 手机点屏幕按钮</p>
    </div>

<script>
let currentGame = 1;
let snakeInterval = null;
let typingRunning = false;

function switchGame(num){
    if (snakeInterval) {
        clearInterval(snakeInterval);
        snakeInterval = null;
    }
    typingRunning = false;

    document.querySelectorAll(".game-view").forEach(item=>{
        item.classList.remove("show");
    });
    document.getElementById("g"+num).classList.add("show");

    document.querySelectorAll(".nav-btn button").forEach((btn,i)=>{
        btn.classList.toggle("active", i+1 === num);
    });

    // 显示/隐藏贪吃蛇按键
    document.getElementById("ctrlBox").classList.toggle("show",num===3);

    currentGame = num;
    if(num===2) startTypingGame();
    if(num===3) startSnakeGame();
}

// ========== 华容道 ==========
const cv1 = document.getElementById("c1");
const ctx1 = cv1.getContext("2d");
const cell = 90;
let map = [];
let emptyX=4,emptyY=4,step=0;

function initGame(){
    let n=1;
    for(let y=0;y<5;y++){
        map[y]=[];
        for(let x=0;x<5;x++) map[y][x]=n++;
    }
    map[4][4]=0;
    let d=[[1,0],[-1,0],[0,1],[0,-1]];
    for(let i=0;i<1000;i++){
        let r=d[Math.floor(Math.random()*4)];
        let nx=emptyX+r[0],ny=emptyY+r[1];
        if(nx>=0&&nx<5&&ny>=0&&ny<5){
            map[emptyY][emptyX]=map[ny][nx];
            map[ny][nx]=0;
            emptyX=nx;emptyY=ny;
        }
    }
    step=0;drawMap();
}
function drawMap(){
    ctx1.clearRect(0,0,450,450);
    for(let y=0;y<5;y++){
        for(let x=0;x<5;x++){
            let v=map[y][x];
            let g=ctx1.createLinearGradient(x*cell,y*cell,x*cell+cell,y*cell+cell);
            g.addColorStop(0,"#f0f4ff");g.addColorStop(1,"#e8ecfb");
            ctx1.fillStyle=g;
            ctx1.fillRect(x*cell+2,y*cell+2,cell-4,cell-4);
            if(v){
                ctx1.fillStyle="#222";
                ctx1.font="36px微软雅黑";
                ctx1.textAlign="center";
                ctx1.fillText(v,x*cell+45,y*cell+55);
            }
        }
    }
    ctx1.fillStyle="#222";
    ctx1.font="20px微软雅黑";
    ctx1.fillText("步数："+step,10,25);
}
cv1.onclick=e=>{
    if(currentGame!==1)return;
    let x=Math.floor(e.offsetX/cell);
    let y=Math.floor(e.offsetY/cell);
    let d=[[1,0],[-1,0],[0,1],[0,-1]];
    for(let i of d){
        if(x+i[0]===emptyX&&y+i[1]===emptyY){
            map[emptyY][emptyX]=map[y][x];
            map[y][x]=0;
            emptyX=x;emptyY=y;
            step++;drawMap();return;
        }
    }
};
initGame();

// ========== 打字游戏 ==========
const cv2=document.getElementById("c2");
const ctx2=cv2.getContext("2d");
let charList=[],score=0;
let allChar="abcdefghijklmnopqrstuvwxyz";
function addChar(){
    charList.push({x:Math.random()*350+20,y:0,text:allChar[Math.floor(Math.random()*26)]});
}
function drawChar(){
    ctx2.clearRect(0,0,420,420);
    ctx2.fillStyle="#333";
    ctx2.font="22px微软雅黑";
    ctx2.fillText("分数："+score,10,30);
    let s=0.35+score/150;
    for(let i=0;i<charList.length;i++){
        let o=charList[i];
        ctx2.fillStyle="#111";
        ctx2.font="26px Consolas";
        ctx2.fillText(o.text,o.x,o.y);
        o.y+=s;
    }
    charList=charList.filter(o=>o.y<410);
}
function runType(){
    if(!typingRunning)return;
    if(Math.random()<0.012)addChar();
    drawChar();
    requestAnimationFrame(runType);
}
function startTypingGame(){
    typingRunning=true;charList=[];score=0;runType();
}

// ========== 贪吃蛇（手机按钮修复版） ==========
const cv3=document.getElementById("c3");
const ctx3=cv3.getContext("2d");
const box=20;
let snake=[],food={};
let dir="right",nextDir="right";
let snakeScore=0;

// 核心：统一改方向函数
function setDir(d){
    if(d=="up"&&dir!="down")nextDir="up";
    if(d=="down"&&dir!="up")nextDir="down";
    if(d=="left"&&dir!="right")nextDir="left";
    if(d=="right"&&dir!="left")nextDir="right";
}

// 绑定按钮（touchstart + click 双保险）
function bindButton(id, dirName){
    const btn=document.getElementById(id);
    function trigger(){
        setDir(dirName);
        if(navigator.vibrate) navigator.vibrate(30); // 震动反馈
    }
    btn.addEventListener("touchstart", e=>{
        e.preventDefault();
        trigger();
    });
    btn.addEventListener("click", trigger);
}

// 绑定四个方向
bindButton("btnUp","up");
bindButton("btnDown","down");
bindButton("btnLeft","left");
bindButton("btnRight","right");

function initSnake(){
    snake=[{x:10*box,y:10*box}];
    food={x:Math.floor(Math.random()*20)*box,y:Math.floor(Math.random()*20)*box};
    dir="right";nextDir="right";snakeScore=0;
}
function drawSnake(){
    dir=nextDir;
    ctx3.fillStyle="#fff";
    ctx3.fillRect(0,0,420,420);

    ctx3.fillStyle="red";
    ctx3.fillRect(food.x,food.y,box,box);

    ctx3.fillStyle="#27ae60";
    for(let i=0;i<snake.length;i++){
        ctx3.fillRect(snake[i].x,snake[i].y,box-1,box-1);
    }

    let hx=snake[0].x,hy=snake[0].y;
    if(dir=="left")hx-=box;
    if(dir=="right")hx+=box;
    if(dir=="up")hy-=box;
    if(dir=="down")hy+=box;

    //撞墙
    if(hx<0||hx>=420||hy<0||hy>=420){
        clearInterval(snakeInterval);
        alert("游戏结束 得分："+snakeScore);
        return;
    }
    //吃食物
    if(hx==food.x&&hy==food.y){
        snakeScore++;
        food.x=Math.floor(Math.random()*20)*box;
        food.y=Math.floor(Math.random()*20)*box;
    }else{
        snake.pop();
    }
    //撞自己
    for(let i=0;i<snake.length;i++){
        if(snake[i].x==hx&&snake[i].y==hy){
            clearInterval(snakeInterval);
            alert("游戏结束 得分："+snakeScore);
            return;
        }
    }
    snake.unshift({x:hx,y:hy});
}
function startSnakeGame(){
    initSnake();
    snakeInterval=setInterval(drawSnake,120);
}

//键盘监听隔离
document.addEventListener("keydown",e=>{
    if(currentGame===2){
        let k=e.key;
        let i=charList.findIndex(o=>o.text===k);
        if(i>-1){score++;charList.splice(i,1);}
    }
    if(currentGame===3){
        let c=e.keyCode;
        if(c===37&&dir!="right")nextDir="left";
        if(c===38&&dir!="down")nextDir="up";
        if(c===39&&dir!="left")nextDir="right";
        if(c===40&&dir!="up")nextDir="down";
    }
});
</script>

</body>
</html>
