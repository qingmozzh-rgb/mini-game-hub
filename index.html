<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
    <title>游戏合集</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#151832;
            text-align:center;
            padding:0;
            overflow:hidden;
        }
        .top-menu{
            padding:10px 0;
            background:#111;
        }
        .top-menu button{
            padding:8px 16px;
            margin:2px;
            border:none;
            border-radius:6px;
            background:#4f63ff;
            color:#fff;
            font-size:15px;
        }
        .top-menu button.active{
            background:#fff;
            color:#000;
        }
        .diff-menu{
            position:absolute;
            top:60px;
            left:0;
            width:100%;
            z-index:10;
            display:none;
        }
        .diff-menu.show{display:block;}
        .diff-menu button{
            padding:6px 14px;
            margin:3px;
            border:none;
            border-radius:5px;
            background:#222;
            color:#fff;
        }
        .game{display:none;}
        .game.show{display:block;}
        canvas{
            touch-action: none;
            display:block;
        }
    </style>
</head>
<body>

<div class="top-menu">
    <button class="active" onclick="switchGame(1)">4×4华容道</button>
    <button onclick="switchGame(2)">切水果</button>
    <button onclick="showDiff()">难度选择</button>
</div>

<div class="diff-menu" id="diffBox">
    <button onclick="setDiff(1)">简单</button>
    <button onclick="setDiff(2)">中等</button>
    <button onclick="setDiff(3)">困难</button>
</div>

<div id="g1" class="game show">
    <canvas id="c1"></canvas>
</div>

<div id="g2" class="game">
    <canvas id="c2"></canvas>
</div>

<script>
let page = 1;
function switchGame(id){
    page = id;
    document.querySelectorAll(".game").forEach(v=>v.classList.remove("show"));
    document.getElementById("g"+id).classList.add("show");
    document.getElementById("diffBox").classList.remove("show");
    document.querySelectorAll(".top-menu button").forEach((v,i)=>{
        v.className = i+1==id?"active":"";
    });
}
function showDiff(){
    if(page===2){
        document.getElementById("diffBox").classList.toggle("show");
    }
}

// 固定：统一超高弹跳（所有难度高度一样）
const FIX_JUMP = -12;
const FIX_GRAVITY = 0.21;
// 难度只控制移动速度 & 生成频率
let moveSpeedRate = 1;
let spawnRate = 0.012;

function setDiff(type){
    if(type===1){
        moveSpeedRate = 0.6;
        spawnRate = 0.008;
        alert("已切换：简单（速度慢）");
    }else if(type===2){
        moveSpeedRate = 1.0;
        spawnRate = 0.012;
        alert("已切换：中等");
    }else{
        moveSpeedRate = 1.6;
        spawnRate = 0.018;
        alert("已切换：困难（速度快）");
    }
    document.getElementById("diffBox").classList.remove("show");
}

//===== 4×4 华容道 =====
let canvas1 = document.getElementById("c1");
let ctx1 = canvas1.getContext("2d");
let map = [];
let ex = 3, ey = 3;
let blockSize;
let gap = 8;

function resizeHua(){
    let dpr = window.devicePixelRatio || 1;
    let maxW = Math.min(window.innerWidth - 20, 450);
    blockSize = (maxW - gap * 5) / 4;
    canvas1.width = (blockSize*4 + gap*5) * dpr;
    canvas1.height = (blockSize*4 + gap*5) * dpr;
    canvas1.style.width = (blockSize*4 + gap*5) + "px";
    canvas1.style.height = (blockSize*4 + gap*5) + "px";
    ctx1.scale(dpr, dpr);
}

function initHua(){
    let num = 1;
    for(let y = 0; y < 4; y++){
        map[y] = [];
        for(let x = 0; x < 4; x++){
            map[y][x] = num++;
        }
    }
    map[3][3] = 0;
    let dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for(let i = 0; i < 600; i++){
        let r = dirs[Math.floor(Math.random()*4)];
        let nx = ex + r[0];
        let ny = ey + r[1];
        if(nx >=0 && nx <4 && ny >=0 && ny <4){
            map[ey][ex] = map[ny][nx];
            map[ny][nx] = 0;
            ex = nx; ey = ny;
        }
    }
    drawHua();
}

function drawHua(){
    ctx1.clearRect(0,0,canvas1.width,canvas1.height);
    for(let y = 0; y < 4; y++){
        for(let x = 0; x < 4; x++){
            let px = gap + x*(blockSize+gap);
            let py = gap + y*(blockSize+gap);
            ctx1.fillStyle = "#eef2ff";
            ctx1.fillRect(px, py, blockSize, blockSize);
            if(map[y][x]){
                ctx1.fillStyle = "#000";
                ctx1.font = "bold " + (blockSize*0.4) + "px Arial";
                ctx1.textAlign = "center";
                ctx1.textBaseline = "middle";
                ctx1.fillText(map[y][x], px+blockSize/2, py+blockSize/2);
            }
        }
    }
}

canvas1.addEventListener("click", e=>{
    if(page != 1) return;
    let rect = canvas1.getBoundingClientRect();
    let x = Math.floor((e.clientX - rect.left - gap)/(blockSize+gap));
    let y = Math.floor((e.clientY - rect.top - gap)/(blockSize+gap));
    moveIfValid(x,y);
});

let touchStartX=0,touchStartY=0;
canvas1.addEventListener("touchstart",e=>{
    if(page!=1)return;
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
});
canvas1.addEventListener("touchend",e=>{
    if(page!=1)return;
    let dx=e.changedTouches[0].clientX-touchStartX;
    let dy=e.changedTouches[0].clientY-touchStartY;
    let x=ex,y=ey;
    if(Math.abs(dx)>Math.abs(dy)){
        if(dx>30)x=ex-1;
        else if(dx<-30)x=ex+1;
    }else{
        if(dy>30)y=ey-1;
        else if(dy<-30)y=ey+1;
    }
    moveIfValid(x,y);
});

function moveIfValid(x,y){
    if(x===ex&&y===ey)return;
    if((x===ex&&Math.abs(y-ey)===1)||(y===ey&&Math.abs(x-ex)===1)){
        map[ey][ex]=map[y][x];
        map[y][x]=0;
        ex=x;ey=y;
        drawHua();
    }
}
window.addEventListener("resize",()=>{resizeHua();drawHua();});
resizeHua();
initHua();

//===== 全屏切水果（高度固定，难度只控速度）=====
let canvas2 = document.getElementById("c2");
let ctx2 = canvas2.getContext("2d");
let W,H;
let dpr = window.devicePixelRatio || 1;

function resizeFruit(){
    W = window.innerWidth;
    H = window.innerHeight - 55;
    canvas2.width = W * dpr;
    canvas2.height = H * dpr;
    canvas2.style.width = W + "px";
    canvas2.style.height = H + "px";
    ctx2.scale(dpr, dpr);
}

let fruitImg = [
    new Image(),new Image(),new Image(),new Image()
];
let bombImg = new Image();
fruitImg[0].src="https://img.icons8.com/fluency/96/apple.png";
fruitImg[1].src="https://img.icons8.com/fluency/96/orange.png";
fruitImg[2].src="https://img.icons8.com/fluency/96/banana.png";
fruitImg[3].src="https://img.icons8.com/fluency/96/watermelon.png";
bombImg.src="https://img.icons8.com/fluency/96/bomb.png";

let fruit=[];
let cutPieces=[];
let juice=[];
let score=0;
let touches = {};
let rect;

function spawnFruit(){
    let isBomb = Math.random() < 0.15;
    let type=Math.floor(Math.random()*4);
    let baseVX = Math.random()*2.2 - 1.1;
    fruit.push({
        x:Math.random()*(W-90)+45,
        y:H+30,
        r:W/12,
        vx: baseVX * moveSpeedRate, // 仅速度受难度控制
        vy: FIX_JUMP,                // 高度固定统一超高
        g: FIX_GRAVITY,
        type:type,
        bomb:isBomb
    });
}

function checkCut(f){
    for(let k in touches){
        let arr = touches[k];
        for(let p of arr){
            let dx=p.x-f.x, dy=p.y-f.y;
            if(Math.hypot(dx,dy) < f.r) return true;
        }
    }
    return false;
}

function run(){
    ctx2.fillStyle="#222222";
    ctx2.fillRect(0,0,W,H);
    if(page!==2){requestAnimationFrame(run);return;}

    if(Math.random() < spawnRate) spawnFruit();

    for(let i=fruit.length-1;i>=0;i--){
        let f=fruit[i];
        f.x+=f.vx; 
        f.y+=f.vy; 
        f.vy+=f.g;

        if(checkCut(f)){
            if(f.bomb){
                score = 0;
                alert("踩到炸弹！分数清零！");
                fruit.splice(i,1);
                continue;
            }
            cutPieces.push({x:f.x-8,y:f.y,r:f.r,type:f.type,vx:-3,vy:-2,rotate:-0.2});
            cutPieces.push({x:f.x+8,y:f.y,r:f.r,type:f.type,vx:3,vy:-2,rotate:0.2});
            for(let j=0;j<8;j++){
                juice.push({x:f.x,y:f.y,vx:Math.random()*7-3.5,vy:Math.random()*7-3.5,a:1});
            }
            score+=15;
            fruit.splice(i,1);
            continue;
        }

        if(f.bomb){
            ctx2.drawImage(bombImg,f.x-f.r,f.y-f.r,f.r*2,f.r*2);
        }else{
            ctx2.drawImage(fruitImg[f.type],f.x-f.r,f.y-f.r,f.r*2,f.r*2);
        }

        if(f.y>H+60) fruit.splice(i,1);
    }

    ctx2.lineWidth=7;
    ctx2.strokeStyle="#ffd700";
    ctx2.shadowColor="#fff";
    ctx2.shadowBlur=12;

    for(let k in touches){
        let arr = touches[k];
        if(arr.length>1){
            ctx2.beginPath();
            ctx2.moveTo(arr[0].x,arr[0].y);
            for(let i=1;i<arr.length;i++) ctx2.lineTo(arr[i].x,arr[i].y);
            ctx2.stroke();
        }
    }
    ctx2.shadowBlur=0;

    for(let i=cutPieces.length-1;i>=0;i--){
        let p=cutPieces[i];
        p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.rotate+=0.1;
        ctx2.save();
        ctx2.translate(p.x,p.y);ctx2.rotate(p.rotate);
        ctx2.globalAlpha=0.7;
        ctx2.drawImage(fruitImg[p.type],-p.r,-p.r,p.r*2,p.r*2);
        ctx2.globalAlpha=1;ctx2.restore();
        if(p.y>H) cutPieces.splice(i,1);
    }

    for(let i=juice.length-1;i>=0;i--){
        let j=juice[i];
        j.x+=j.vx;j.y+=j.vy;j.a-=0.04;
        if(j.a<=0){juice.splice(i,1);continue;}
        ctx2.globalAlpha=j.a;
        ctx2.fillStyle="#ff4444";
        ctx2.beginPath();ctx2.arc(j.x,j.y,6,0,Math.PI*2);ctx2.fill();
        ctx2.globalAlpha=1;
    }

    ctx2.fillStyle="#fff";
    ctx2.font="28px 微软雅黑";
    ctx2.fillText("分数："+score,15,40);

    requestAnimationFrame(run);
}
resizeFruit();
run();
window.onresize = ()=>{resizeFruit();};

canvas2.addEventListener("touchstart",e=>{
    e.preventDefault();
    rect=canvas2.getBoundingClientRect();
    for(let i=0;i<e.touches.length;i++){
        let t=e.touches[i];
        touches[t.identifier] = [];
    }
});
canvas2.addEventListener("touchmove",e=>{
    e.preventDefault();
    rect=canvas2.getBoundingClientRect();
    for(let i=0;i<e.touches.length;i++){
        let t=e.touches[i];
        let x=t.clientX-rect.left;
        let y=t.clientY-rect.top;
        if(touches[t.identifier]){
            touches[t.identifier].push({x,y});
        }
    }
});
canvas2.addEventListener("touchend",e=>{
    for(let i=0;i<e.changedTouches.length;i++){
        let t=e.changedTouches[i];
        delete touches[t.identifier];
    }
});
canvas2.addEventListener("touchcancel",e=>{
    for(let i=0;i<e.changedTouches.length;i++){
        let t=e.changedTouches[i];
        delete touches[t.identifier];
    }
});

let mouseArr=[];
canvas2.addEventListener("mousedown",e=>{
    rect=canvas2.getBoundingClientRect();
    mouseArr=[];
});
canvas2.addEventListener("mousemove",e=>{
    if(e.buttons!==1)return;
    rect=canvas2.getBoundingClientRect();
    mouseArr.push({x:e.clientX-rect.left,y:e.clientY-rect.top});
    touches["mouse"]=mouseArr;
});
canvas2.addEventListener("mouseup",()=>delete touches["mouse"]);
canvas2.addEventListener("mouseleave",()=>delete touches["mouse"]);

</script>
</body>
</html>
