<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>豪华休闲游戏乐园 | 华容道 & 极速打字</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft Yahei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a40);
            background-size: 400% 400%;
            animation: bgMove 15s ease infinite;
            overflow-x: hidden;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header-box {
            text-align: center;
            padding-top: 30px;
            padding-bottom: 20px;
        }

        .header-box h1 {
            font-size: 32px;
            color: #fff;
            background: linear-gradient(90deg, #00f5d4, #6dd5ed, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .header-box p {
            color: #c0c8e7;
            font-size: 14px;
        }

        .nav-btn {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .nav-btn button {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #4158d0, #c850c0);
        }

        .nav-btn button.active {
            background: #fff;
            color: #24243e;
        }

        .game-card {
            width: 90%;
            max-width: 380px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .game-view {
            display: none;
            text-align: center;
        }

        .game-view.show {
            display: block;
        }

        .game-title {
            font-size: 18px;
            color: #fff;
            margin-bottom: 15px;
        }

        canvas {
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            background: #fff;
            display: block;
            margin: 0 auto;
        }

        .desc {
            text-align: center;
            color: #a9b4e8;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>🎮 豪华游戏娱乐中心</h1>
        <p>智慧华容道 | 极速打字训练 · 休闲解压两不误</p>
    </div>

    <div class="nav-btn">
        <button class="active" onclick="switchGame(1)">🧩 华容道</button>
        <button onclick="switchGame(2)">⌨️ 打字游戏</button>
    </div>

    <div class="game-card">
        <div id="g1" class="game-view show">
            <div class="game-title">智慧数字华容道</div>
            <canvas id="c1" width="350" height="350"></canvas>
        </div>

        <div id="g2" class="game-view">
            <div class="game-title">打字闯关游戏</div>
            <canvas id="c2" width="350" height="350"></canvas>
        </div>
    </div>

    <div class="desc">
        <p>🧩 点击空白格相邻方块移动</p>
        <p>⌨️ 按键盘字母消除对应字符</p>
    </div>

<script>
// 切换游戏
function switchGame(num){
    document.querySelectorAll(".game-view").forEach(item=>{
        item.classList.remove("show");
    });
    document.getElementById("g"+num).classList.add("show");

    document.querySelectorAll(".nav-btn button").forEach((btn,i)=>{
        btn.classList.toggle("active", i+1 === num);
    });
}

// ==================== 华容道（修复版） ====================
const cv1 = document.getElementById("c1");
const ctx1 = cv1.getContext("2d");
const size = 70;
let map = [];
let emptyX = 4, emptyY = 4;
let step = 0;

function initMap(){
    let num = 1;
    for(let y=0;y<5;y++){
        map[y] = [];
        for(let x=0;x<5;x++){
            map[y][x] = num++;
        }
    }
    map[4][4] = 0;
    randomMap();
    draw();
}

function randomMap(){
    let d = [[-1,0],[1,0],[0,-1],[0,1]];
    for(let i=0;i<1000;i++){
        let r = d[Math.floor(Math.random()*4)];
        let nx = emptyX + r[0];
        let ny = emptyY + r[1];
        if(nx>=0&&nx<5&&ny>=0&&ny<5){
            map[emptyY][emptyX] = map[ny][nx];
            map[ny][nx] = 0;
            emptyX = nx;
            emptyY = ny;
        }
    }
}

function draw(){
    ctx1.clearRect(0,0,350,350);
    for(let y=0;y<5;y++){
        for(let x=0;x<5;x++){
            let v = map[y][x];
            ctx1.fillStyle = v===0 ? "#eee" : "#4158d0";
            ctx1.fillRect(x*size+2,y*size+2,size-4,size-4);
            if(v!==0){
                ctx1.fillStyle = "#fff";
                ctx1.font = "28px Arial";
                ctx1.textAlign = "center";
                ctx1.fillText(v, x*size+size/2, y*size+size/2+8);
            }
        }
    }
    ctx1.fillStyle = "#000";
    ctx1.font = "14px Arial";
    ctx1.fillText("步数："+step, 10, 20);
}

cv1.addEventListener("click", e=>{
    let x = Math.floor(e.offsetX/size);
    let y = Math.floor(e.offsetY/size);
    let dx = Math.abs(x-emptyX);
    let dy = Math.abs(y-emptyY);
    if((dx===1&&dy===0) || (dx===0&&dy===1)){
        map[emptyY][emptyX] = map[y][x];
        map[y][x] = 0;
        emptyX = x;
        emptyY = y;
        step++;
        draw();
    }
});

initMap();

// ==================== 打字游戏（修复版） ====================
const cv2 = document.getElementById("c2");
const ctx2 = cv2.getContext("2d");
let chars = [];
let score = 0;
const keys = "abcdefghijklmnopqrstuvwxyz";

function newChar(){
    chars.push({
        x: Math.random()*280+35,
        y: 10,
        c: keys[Math.floor(Math.random()*26)]
    });
}

function drawGame(){
    ctx2.clearRect(0,0,350,350);
    ctx2.fillStyle = "#000";
    ctx2.font = "16px Arial";
    ctx2.fillText("分数："+score,10,25);

    if(Math.random()<0.015) newChar();

    for(let i=0;i<chars.length;i++){
        let o = chars[i];
        ctx2.fillStyle = "#c850c0";
        ctx2.font = "26px Arial";
        ctx2.fillText(o.c, o.x, o.y);
        o.y += 0.4;
    }

    chars = chars.filter(i=>i.y<340);
    requestAnimationFrame(drawGame);
}

document.addEventListener("keydown", e=>{
    let k = e.key.toLowerCase();
    for(let i=0;i<chars.length;i++){
        if(chars[i].c === k){
            chars.splice(i,1);
            score++;
            return;
        }
    }
});

drawGame();
</script>
</body>
</html>
